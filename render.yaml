services:
  - type: web
    name: park-ave-jewelers
    runtime: node
    plan: starter
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_CRON_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: orders@parkavejewelry.com
      - key: ABANDONED_CART_DELAY_MINUTES
        value: 60
      - key: DB_PATH
        value: /var/data/park_ave.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
    disk:
      name: park-ave-data
      mountPath: /var/data
      sizeGB: 1

  # Triggers the abandoned-cart check over HTTP instead of running as an
  # in-process timer on the web service — survives deploys/restarts and
  # (if the web service ever scales past one instance) still only fires
  # once per run instead of once per instance. Can't touch the SQLite file
  # directly since Render disks only attach to one service.
  - type: cron
    name: park-ave-abandoned-cart-cron
    runtime: node
    plan: starter
    schedule: "*/15 * * * *"
    buildCommand: "echo no build needed"
    startCommand: >-
      curl -sf -X POST -H "x-internal-secret: $INTERNAL_CRON_SECRET" "$APP_URL/api/internal/abandoned-cart-check"
    envVars:
      - key: INTERNAL_CRON_SECRET
        fromService:
          type: web
          name: park-ave-jewelers
          envVarKey: INTERNAL_CRON_SECRET
      - key: APP_URL
        sync: false
